server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    ssl_certificate /home/ubuntu/subway-gleam/server/server.crt;
    ssl_certificate_key /home/ubuntu/subway-gleam/server/server.key;

    server_name _;

    location / {
        proxy_pass https://0.0.0.0:4433;
        proxy_http_version 1.1;
    }
}
